<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Articles Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 排序图标：高对比度设计，适合电子墨水屏 */
        .sort-icon::after { content: ' ↕'; opacity: 0.2; font-size: 0.9em; }
        .sort-asc::after { content: ' ↑'; opacity: 1; color: #4f46e5; }
        .sort-desc::after { content: ' ↓'; opacity: 1; color: #4f46e5; }
        .highlight { background-color: #fde047; font-weight: bold; border-radius: 2px; padding: 0 2px; }
        /* 滚动条优化 */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
        /* 基础兼容性补丁 */
        svg { display: inline-block; vertical-align: middle; flex-shrink: 0; pointer-events: none; }
        table { border-collapse: collapse; }
        tr:nth-child(even) { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 sm:p-8 font-sans antialiased text-gray-900">
    <div class="max-w-7xl mx-auto bg-white shadow-xl rounded-xl overflow-hidden flex flex-col min-h-[85vh]">
        <!-- Header -->
        <div class="px-4 py-5 sm:px-6 border-b border-gray-200 bg-white flex-none">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-900 tracking-tight">X Articles Library</h1>
                <div class="text-right">
                    <div class="text-xs font-medium text-gray-400 uppercase tracking-wider">Last Sync</div>
                    <div class="text-sm font-semibold text-gray-600">{{ generated_at }}</div>
                </div>
            </div>
            
            <!-- Search Interface -->
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-500">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" id="searchInput" placeholder="Search by topic, author, or keywords..." 
                       class="w-full appearance-none rounded-lg block pl-10 pr-10 py-2.5 border border-gray-300 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent sm:text-sm shadow-sm transition-shadow">
                <button id="clearSearch" class="hidden absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Main Content (Table) -->
        <div class="overflow-x-auto flex-grow custom-scrollbar">
            <table class="min-w-full divide-y divide-gray-200 sm:table-auto">
                <thead class="bg-gray-50 sticky top-0 z-10 shadow-sm select-none">
                    <tr>
                        <th id="th-date" scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-widest w-28 sm:w-36 cursor-pointer hover:bg-gray-100 sort-icon" onclick="sortData('date')">Date</th>
                        <th id="th-title" scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-widest cursor-pointer hover:bg-gray-100 sort-icon" onclick="sortData('title')">Topic</th>
                        <th id="th-author" scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-widest w-32 sm:w-48 cursor-pointer hover:bg-gray-100 sort-icon" onclick="sortData('author')">Author</th>
                    </tr>
                </thead>
                <tbody id="articleList" class="bg-white divide-y divide-gray-100">
                    <!-- Dynamic rendering -->
                </tbody>
            </table>
        </div>
        
        <!-- Pagination & Footer -->
        <div class="px-4 py-5 sm:px-6 bg-gray-50 border-t border-gray-200 flex flex-col md:flex-row justify-between items-center gap-4 flex-none">
            <span id="showingCount" class="text-sm font-medium text-gray-500 italic">Showing 0 of 0 articles</span>
            <div id="paginationControls" class="flex items-center gap-2"></div>
        </div>
    </div>

    <script>
        // Data and State
        const rawData = {{ articles_json | safe }};
        let currentData = [...rawData];
        const STORAGE_KEY = 'x_library_state_v5_final';
        
        let sortCol = 'date';
        let sortAsc = false; 
        let currentSearchTerm = '';
        let currentPage = 1;
        const rowsPerPage = {{ items_per_page | default(20) }};

        // Cache elements
        const tbody = document.getElementById('articleList');
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearch');
        const countLabel = document.getElementById('showingCount');
        const paginationContainer = document.getElementById('paginationControls');
        const thElements = {
            date: document.getElementById('th-date'),
            title: document.getElementById('th-title'),
            author: document.getElementById('th-author')
        };

        function saveState() {
            const state = { sortCol, sortAsc, currentSearchTerm, currentPage, scrollY: window.scrollY };
            sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadState() {
            const saved = sessionStorage.getItem(STORAGE_KEY);
            if (!saved) return null;
            try {
                const s = JSON.parse(saved);
                sortCol = s.sortCol || 'date';
                sortAsc = s.sortAsc !== undefined ? s.sortAsc : false;
                currentSearchTerm = s.currentSearchTerm || '';
                currentPage = s.currentPage || 1;
                return s;
            } catch (e) { return null; }
        }

        function highlightText(text, term) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            const escaped = div.innerHTML;
            if (!term) return escaped;
            const regTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return escaped.replace(new RegExp(`(${regTerm})`, 'gi'), '<span class="highlight">$1</span>');
        }

        function renderPagination(totalItems) {
            const totalPages = Math.ceil(totalItems / rowsPerPage) || 1;
            if (totalPages <= 1) { paginationContainer.innerHTML = ''; return; }
            const atFirst = currentPage === 1;
            const atLast = currentPage === totalPages;
            
            paginationContainer.innerHTML = `
                <div class="flex items-center gap-1">
                    <button onclick="goToPage(1)" class="px-2 py-1 border border-gray-300 rounded text-xs font-medium ${atFirst ? 'text-gray-300 cursor-not-allowed' : 'text-gray-700 bg-white hover:bg-gray-100 hover:text-indigo-600'}" ${atFirst ? 'disabled' : ''}>«</button>
                    <button onclick="changePage(-1)" class="px-3 py-1 border border-gray-300 rounded text-sm font-medium ${atFirst ? 'text-gray-300 cursor-not-allowed' : 'text-gray-700 bg-white hover:bg-gray-100 hover:text-indigo-600'}" ${atFirst ? 'disabled' : ''}>Prev</button>
                </div>
                <div class="flex items-center gap-2 mx-1">
                    <input type="number" value="${currentPage}" min="1" max="${totalPages}" onkeydown="if(event.key==='Enter') goToPage(parseInt(this.value))" class="w-12 px-1 py-0.5 border border-gray-300 rounded text-center text-sm outline-none focus:ring-1 focus:ring-indigo-500">
                    <span class="text-xs sm:text-sm text-gray-600">of ${totalPages}</span>
                </div>
                <div class="flex items-center gap-1">
                    <button onclick="changePage(1)" class="px-3 py-1 border border-gray-300 rounded text-sm font-medium ${atLast ? 'text-gray-300 cursor-not-allowed' : 'text-gray-700 bg-white hover:bg-gray-100 hover:text-indigo-600'}" ${atLast ? 'disabled' : ''}>Next</button>
                    <button onclick="goToPage(${totalPages})" class="px-2 py-1 border border-gray-300 rounded text-xs font-medium ${atLast ? 'text-gray-300 cursor-not-allowed' : 'text-gray-700 bg-white hover:bg-gray-100 hover:text-indigo-600'}" ${atLast ? 'disabled' : ''}>»</button>
                </div>`;
        }

        function renderTable(data, term = '') {
            tbody.innerHTML = '';
            const start = (currentPage - 1) * rowsPerPage;
            const displayData = data.slice(start, start + rowsPerPage);
            
            if (displayData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-12 text-center text-gray-500 italic bg-gray-50">No results found matching your search.</td></tr>`;
            } else {
                displayData.forEach(art => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-indigo-50/20 transition-colors';
                    const author = art.author || 'Unknown';
                    const authorEsc = author.replace(/'/g, "\\'");
                    
                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-xs sm:text-sm text-gray-500 font-mono">${highlightText(art.date, term)}</td>
                        <td class="px-6 py-4">
                            <div class="text-sm text-gray-900 mb-1 leading-snug break-words max-w-[180px] sm:max-w-md">
                                <a href="${art.local_path}" class="hover:text-indigo-600 transition-colors hover:underline underline-offset-4">${highlightText(art.title, term)}</a>
                            </div>
                            <div class="text-[10px] sm:text-xs text-gray-400 flex items-center gap-1.5 mt-1">
                                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                                <a href="${art.url}" target="_blank" class="hover:underline hover:text-blue-500 transition-all">Original Source</a>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm">
                            <button onclick="filterByAuthor('${authorEsc}')" class="text-gray-600 hover:text-indigo-600 hover:underline font-medium truncate max-w-[100px] sm:max-w-none block text-left">
                                ${highlightText(author, term)}
                            </button>
                        </td>`;
                    tbody.appendChild(row);
                });
            }
            countLabel.textContent = `Showing ${data.length > 0 ? start + 1 : 0}-${Math.min(start + rowsPerPage, data.length)} of ${data.length}`;
            renderPagination(data.length);
        }

        function applyFiltersAndSort(init = false) {
            const s = currentSearchTerm;
            currentData = rawData.filter(i => 
                String(i.title||'').toLowerCase().includes(s) || 
                String(i.author||'').toLowerCase().includes(s) || 
                String(i.date||'').toLowerCase().includes(s)
            );
            
            currentData.sort((a, b) => {
                let vA = String(a[sortCol] || '').toLowerCase();
                let vB = String(b[sortCol] || '').toLowerCase();
                if (vA < vB) return sortAsc ? -1 : 1;
                if (vA > vB) return sortAsc ? 1 : -1;
                return 0;
            });

            const max = Math.ceil(currentData.length / rowsPerPage) || 1;
            if (currentPage > max) currentPage = max;
            renderTable(currentData, s);

            Object.values(thElements).forEach(el => el.classList.remove('sort-asc', 'sort-desc'));
            if (thElements[sortCol]) thElements[sortCol].classList.add(sortAsc ? 'sort-asc' : 'sort-desc');
            if (!init) saveState();
        }

        function sortData(col) {
            if (sortCol === col) sortAsc = !sortAsc;
            else { sortCol = col; sortAsc = col !== 'date'; }
            currentPage = 1;
            applyFiltersAndSort();
        }

        function goToPage(p) {
            const max = Math.ceil(currentData.length / rowsPerPage) || 1;
            if (p >= 1 && p <= max) { currentPage = p; renderTable(currentData, currentSearchTerm); saveState(); }
        }

        function changePage(d) { goToPage(currentPage + d); }

        function filterByAuthor(a) { 
            searchInput.value = a; 
            currentSearchTerm = a.toLowerCase(); 
            currentPage = 1; 
            clearSearchBtn.classList.remove('hidden');
            applyFiltersAndSort(); 
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        searchInput.addEventListener('input', e => {
            currentSearchTerm = e.target.value.toLowerCase();
            currentPage = 1;
            clearSearchBtn.classList.toggle('hidden', !currentSearchTerm);
            applyFiltersAndSort();
        });

        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            currentSearchTerm = '';
            clearSearchBtn.classList.add('hidden');
            currentPage = 1;
            applyFiltersAndSort();
        });

        // Initialize
        const sState = loadState();
        if (currentSearchTerm) { searchInput.value = currentSearchTerm; clearSearchBtn.classList.remove('hidden'); }
        applyFiltersAndSort(true);
        if (sState && sState.scrollY) setTimeout(() => window.scrollTo(0, sState.scrollY), 100);
        
        let scrollTimeout;
        window.addEventListener('scroll', () => {
            if (scrollTimeout) return;
            scrollTimeout = setTimeout(() => { saveState(); scrollTimeout = null; }, 200);
        }, { passive: true });
    </script>
</body>
</html>
