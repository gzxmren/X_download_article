<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Articles Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sort-icon::after { content: '↕'; margin-left: 4px; font-size: 0.8em; }
        .sort-asc::after { content: '↑'; }
        .sort-desc::after { content: '↓'; }
        .highlight { background-color: #fde047; font-weight: bold; border-radius: 2px; padding: 0 2px; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #d1d5db; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background-color: #f3f4f6; }
    </style>
</head>
<body class="bg-yellow-100 min-h-screen p-8">
    <div class="max-w-6xl mx-auto bg-white shadow-lg rounded-lg overflow-hidden flex flex-col min-h-[80vh]">
        <!-- Header & Controls -->
        <div class="px-6 py-4 border-b border-gray-200 bg-white flex-none">
            <div class="flex flex-col md:flex-row justify-between items-center mb-4">
                <h1 class="text-2xl font-bold text-gray-800">📚 X Articles Library</h1>
                <span class="text-sm text-gray-500">Last Updated: {{ generated_at }}</span>
            </div>
            
            <!-- Search & Sort Controls -->
            <div class="flex flex-col md:flex-row gap-4">
                <div class="relative flex-1">
                    <input type="text" id="searchInput" placeholder="Search title, author or date (e.g. 2026-02)..." 
                           class="w-full appearance-none rounded-md relative block px-3 py-2 pr-10 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    <button id="clearSearch" class="hidden absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="sortData('date')" id="btn-date" class="px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none sort-icon transition-colors">
                        Date
                    </button>
                    <button onclick="sortData('author')" id="btn-author" class="px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none sort-icon transition-colors">
                        Author
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Table -->
        <div class="overflow-x-auto flex-grow custom-scrollbar">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50 sticky top-0 z-10 shadow-sm">
                    <tr>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-32 cursor-pointer hover:bg-gray-100 transition" onclick="sortData('date')">Date</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100 transition" onclick="sortData('title')">Topic</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-40 cursor-pointer hover:bg-gray-100 transition" onclick="sortData('author')">Author</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-32">Action</th>
                    </tr>
                </thead>
                <tbody id="articleList" class="bg-white divide-y divide-gray-200">
                    <!-- JS will populate this -->
                </tbody>
            </table>
        </div>
        
        <!-- Footer / Pagination -->
        <div class="px-6 py-4 bg-gray-50 border-t border-gray-200 text-sm text-gray-500 flex flex-col md:flex-row justify-between items-center gap-4 flex-none">
            <span id="showingCount">Showing 0 of 0 articles</span>
            
            <div class="flex items-center gap-2" id="paginationControls">
                <!-- Pagination buttons injected by JS -->
            </div>
        </div>
    </div>

    <script>
        // Data Injection from Python
        const rawData = {{ articles_json | safe }};
        let currentData = [...rawData];
        
        // --- State Management (with Persistence) ---
        const STORAGE_KEY = 'x_library_state';
        
        function saveState() {
            const state = {
                sortCol,
                sortAsc,
                currentSearchTerm,
                currentPage,
                scrollY: window.scrollY
            };
            sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadState() {
            const saved = sessionStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const state = JSON.parse(saved);
                    sortCol = state.sortCol || 'date';
                    sortAsc = state.sortAsc !== undefined ? state.sortAsc : false;
                    currentSearchTerm = state.currentSearchTerm || '';
                    currentPage = state.currentPage || 1;
                    return state;
                } catch (e) {
                    console.error("Failed to restore state", e);
                }
            }
            return null;
        }

        // Default State
        let sortCol = 'date';
        let sortAsc = false; 
        let currentSearchTerm = '';
        let currentPage = 1;
        const rowsPerPage = {{ items_per_page | default(20) }};

        // DOM Elements
        const tbody = document.getElementById('articleList');
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearch');
        const countLabel = document.getElementById('showingCount');
        const paginationContainer = document.getElementById('paginationControls');
        const btnDate = document.getElementById('btn-date');
        const btnAuthor = document.getElementById('btn-author');

        // --- Initialization ---
        const prevState = loadState();
        
        // Initial setup based on state
        if (currentSearchTerm) {
            searchInput.value = currentSearchTerm;
            clearSearchBtn.classList.remove('hidden');
        }

        // Apply initial data filtering and sorting
        applyFiltersAndSort(true); // Initial run

        if (prevState && prevState.scrollY) {
            // Wait for render to finish before scrolling
            setTimeout(() => window.scrollTo(0, prevState.scrollY), 100);
        }

        // Search Logic
        function updateSearch(term) {
            currentSearchTerm = term.toLowerCase();
            currentPage = 1;
            
            if (currentSearchTerm) {
                clearSearchBtn.classList.remove('hidden');
            } else {
                clearSearchBtn.classList.add('hidden');
            }

            applyFiltersAndSort();
        }

        function applyFiltersAndSort(isInitial = false) {
            // Filter
            currentData = rawData.filter(item => {
                return (item.title && item.title.toLowerCase().includes(currentSearchTerm)) ||
                       (item.author && item.author.toLowerCase().includes(currentSearchTerm)) ||
                       (item.date && item.date.toLowerCase().includes(currentSearchTerm));
            });

            // Sort (Internal call, don't reset page)
            sortInternal();
            
            // Ensure currentPage is valid for filtered data
            const maxPage = Math.ceil(currentData.length / rowsPerPage) || 1;
            if (currentPage > maxPage) currentPage = maxPage;

            renderTable(currentData, currentSearchTerm);
            updateSortUI();
            if (!isInitial) saveState();
        }

        searchInput.addEventListener('input', (e) => updateSearch(e.target.value));
        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            updateSearch('');
        });

        // Author Filter Logic
        function filterByAuthor(author) {
            const cleanAuthor = author.trim();
            searchInput.value = cleanAuthor;
            updateSearch(cleanAuthor);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Sort Logic
        function sortData(column, keepOrder = false) {
            if (!keepOrder) {
                if (sortCol === column) {
                    sortAsc = !sortAsc;
                } else {
                    sortCol = column;
                    sortAsc = column !== 'date'; 
                }
                currentPage = 1;
            }
            applyFiltersAndSort();
        }

        function sortInternal() {
            currentData.sort((a, b) => {
                let valA = (a[sortCol] || '').toString().toLowerCase();
                let valB = (b[sortCol] || '').toString().toLowerCase();
                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
        }

        // Pagination Logic
        function goToPage(page) {
            const totalPages = Math.ceil(currentData.length / rowsPerPage);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderTable(currentData, currentSearchTerm);
                saveState();
            }
        }

        function changePage(delta) {
            goToPage(currentPage + delta);
        }

        // Save scroll position with light throttling
        let scrollTimeout;
        window.addEventListener('scroll', () => {
            if (scrollTimeout) return;
            scrollTimeout = setTimeout(() => {
                if (currentData.length > 0) saveState();
                scrollTimeout = null;
            }, 200);
        }, { passive: true });

        function handleJump(e, totalPages) {
            if (e.key === 'Enter') {
                const page = parseInt(e.target.value);
                if (!isNaN(page) && page >= 1 && page <= totalPages) {
                    goToPage(page);
                } else {
                    e.target.value = currentPage;
                }
            }
        }

        function renderPagination(totalItems) {
            const totalPages = Math.ceil(totalItems / rowsPerPage);
            if (totalPages <= 1) {
                paginationContainer.innerHTML = '';
                return;
            }

            const atFirst = currentPage === 1;
            const atLast = currentPage === totalPages;

            paginationContainer.innerHTML = `
                <div class="flex items-center gap-1">
                    <button onclick="goToPage(1)" title="First Page"
                        class="px-2 py-1 border border-gray-300 rounded-md text-xs font-medium ${atFirst ? 'text-gray-300 cursor-not-allowed' : 'text-gray-700 bg-white hover:bg-gray-100 hover:text-indigo-600'} transition-colors" 
                        ${atFirst ? 'disabled' : ''}>«</button>
                    <button onclick="changePage(-1)" title="Previous Page"
                        class="px-3 py-1 border border-gray-300 rounded-md text-sm font-medium ${atFirst ? 'text-gray-300 cursor-not-allowed' : 'text-gray-700 bg-white hover:bg-gray-100 hover:text-indigo-600'} transition-colors" 
                        ${atFirst ? 'disabled' : ''}>Prev</button>
                </div>
                
                <div class="flex items-center gap-2 mx-2">
                    <span class="text-gray-600">Page</span>
                    <input type="number" value="${currentPage}" min="1" max="${totalPages}"
                           onkeydown="handleJump(event, ${totalPages})"
                           class="w-12 px-1 py-0.5 border border-gray-300 rounded text-center focus:ring-1 focus:ring-indigo-500 focus:outline-none text-gray-900 font-medium">
                    <span class="text-gray-600 whitespace-nowrap">of ${totalPages}</span>
                </div>

                <div class="flex items-center gap-1">
                    <button onclick="changePage(1)" title="Next Page"
                        class="px-3 py-1 border border-gray-300 rounded-md text-sm font-medium ${atLast ? 'text-gray-300 cursor-not-allowed' : 'text-gray-700 bg-white hover:bg-gray-100 hover:text-indigo-600'} transition-colors" 
                        ${atLast ? 'disabled' : ''}>Next</button>
                    <button onclick="goToPage(${totalPages})" title="Last Page"
                        class="px-2 py-1 border border-gray-300 rounded-md text-xs font-medium ${atLast ? 'text-gray-300 cursor-not-allowed' : 'text-gray-700 bg-white hover:bg-gray-100 hover:text-indigo-600'} transition-colors" 
                        ${atLast ? 'disabled' : ''}>»</button>
                </div>
            `;
        }

        function highlightText(text, term) {
            if (!term) return text;
            const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        function updateSortUI() {
            [btnDate, btnAuthor].forEach(btn => {
                btn.classList.remove('sort-asc', 'sort-desc', 'text-indigo-600', 'bg-indigo-50', 'border-indigo-500');
                btn.classList.add('text-gray-700');
            });
            let activeBtn = sortCol === 'date' ? btnDate : (sortCol === 'author' ? btnAuthor : null);
            if (activeBtn) {
                activeBtn.classList.add(sortAsc ? 'sort-asc' : 'sort-desc', 'text-indigo-600', 'bg-indigo-50', 'border-indigo-500');
                activeBtn.classList.remove('text-gray-700');
            }
        }

        function renderTable(data, term = '') {
            tbody.innerHTML = '';
            const start = (currentPage - 1) * rowsPerPage;
            const displayData = data.slice(start, start + rowsPerPage);

            if (displayData.length === 0) {
                 tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-gray-500 italic">No articles found matching "${term}"</td></tr>`;
            } else {
                displayData.forEach(art => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-gray-50 transition duration-150 ease-in-out';
                    
                    const authorRaw = art.author || 'Unknown';
                    const authorEscaped = authorRaw.replace(/'/g, "\\'"); // Prevent JS quote breaks

                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 font-mono">${highlightText(art.date || '', term)}</td>
                        <td class="px-6 py-4">
                            <div class="text-sm font-medium text-gray-900 mb-1"><a href="${art.local_path}" class="hover:text-indigo-600 transition-colors">${highlightText(art.title || 'Untitled', term)}</a></div>
                            <div class="text-xs text-gray-400 flex items-center gap-1">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                <a href="${art.url}" target="_blank" class="hover:underline hover:text-blue-500">Original Source</a>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                            <button onclick="filterByAuthor('${authorEscaped}')" 
                                    title="Filter articles by ${authorRaw}"
                                    class="hover:text-indigo-600 hover:underline transition-colors font-medium">
                                ${highlightText(authorRaw, term)}
                            </button>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                            <a href="${art.local_path}" class="inline-flex items-center px-3 py-1 border border-transparent text-xs font-medium rounded-md text-indigo-700 bg-indigo-100 hover:bg-indigo-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">View Local</a>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }
            countLabel.textContent = `Showing ${data.length > 0 ? start + 1 : 0}-${Math.min(start + rowsPerPage, data.length)} of ${data.length} articles`;
            renderPagination(data.length);
        }
    </script>
</body>
</html>
