# Application Configuration
app:
  # Browser & Network
  timeout: 90
  scroll_count: 3
  headless: true
  max_workers: 5
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  proxy: ""  # Example: "http://127.0.0.1:7890"

  # Output Formatting
  items_per_page: 10
  max_filename_length: 64
  max_topic_length: 40

# CSS Selectors for Platforms
# Edit these if X.com changes their layout
# Supports single string or list of backup selectors
selectors:
  x_com:
    article: 
      - "article"
      - "div[data-testid='tweet']"
    time: 
      - "time"
      - "a[href*='/status/'] time"
    user_name: 
      - "div[data-testid='User-Name']"
      - "div[data-testid='author-name']"
    tweet_text: 
      - "div[data-testid='tweetText']"
      - "div[data-testid='twitterArticleRichTextView']"
      - ".tweet-text"
    article_title:
      - "div[data-testid='twitter-article-title']"
      - "h1"
    article_content:
      - "div[data-testid='twitterArticleRichTextView']"
      - "article div[dir='auto']"
    images: "img"
